<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - DreamFinder</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <div class="login-box">

        <h2>Login</h2>
        <p>Welcome back! Continue your journey</p>

        <form id="loginForm">

    <div class="input-box">
        <input type="email" id="email" required>
        <label>Email</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
    </div>

    <button type="submit" class="btn">Login</button>

    <p style="margin-top:15px;">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </p>

</form>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCHgbiqtDlQU1IogjiZueOehovU9x-F8xk",
  authDomain: "quiz-8198a.firebaseapp.com",
  projectId: "quiz-8198a",
  appId: "1:495360395071:web:afc7c2492ddcb5bbd3758a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault(); // 🔥 stops refresh

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);

        if (!userCredential.user.emailVerified) {
            alert("❌ Verify your email first!");
            return;
        }

        alert("✅ Login successful!");
        window.location.href = "dash.html";

    } catch (error) {
        alert(error.message);
    }
});
</script>

</body>
</html>
