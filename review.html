<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reviews</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #4f46e5, #06b6d4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: white;
    width: 400px;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TITLE */
h2 {
    margin-bottom: 10px;
}

/* STARS */
.stars span {
    font-size: 28px;
    cursor: pointer;
    color: #ccc;
    transition: 0.2s;
}

.stars span.active {
    color: gold;
    transform: scale(1.2);
}

/* TEXTAREA */
textarea {
    width: 100%;
    height: 80px;
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #3730a3;
}

/* REVIEW LIST */
.review-card {
    background: #f1f1f1;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    text-align: left;
}

/* BACK */
.back {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">⬅ Back</div>

<div class="container">

    <h2>⭐ Give Your Review</h2>

    <!-- Stars -->
    <div class="stars" id="stars">
        <span onclick="setRating(1)">★</span>
        <span onclick="setRating(2)">★</span>
        <span onclick="setRating(3)">★</span>
        <span onclick="setRating(4)">★</span>
        <span onclick="setRating(5)">★</span>
    </div>

    <!-- Input -->
    <textarea id="reviewText" placeholder="Write your feedback..."></textarea>

    <button onclick="submitReview()">Submit Review</button>

    <!-- Avg -->
    <h3 id="avgRating">Average: 0 ⭐</h3>

    <!-- Reviews -->
    <div id="reviewsList"></div>

</div>

<script>

// GET FIELD (IMPORTANT)
const params = new URLSearchParams(window.location.search);
const field = params.get("field") || "general";

let rating = 0;

// ⭐ SET RATING
function setRating(val){
    rating = val;

    const stars = document.querySelectorAll("#stars span");
    stars.forEach((s,i)=>{
        s.classList.toggle("active", i < val);
    });
}

// SUBMIT
function submitReview(){
    const text = document.getElementById("reviewText").value;

    if(!rating || !text){
        alert("Please give rating & review");
        return;
    }

    const reviews = JSON.parse(localStorage.getItem("reviews-"+field)) || [];

    reviews.push({
        rating: rating,
        text: text
    });

    localStorage.setItem("reviews-"+field, JSON.stringify(reviews));

    document.getElementById("reviewText").value = "";
    rating = 0;

    loadReviews();
}

// LOAD REVIEWS
function loadReviews(){
    const reviews = JSON.parse(localStorage.getItem("reviews-"+field)) || [];

    const list = document.getElementById("reviewsList");
    list.innerHTML = "";

    let total = 0;

    reviews.forEach(r=>{
        total += r.rating;

        const div = document.createElement("div");
        div.className = "review-card";

        div.innerHTML = `
            <strong>${"⭐".repeat(r.rating)}</strong>
            <p>${r.text}</p>
        `;

        list.appendChild(div);
    });

    let avg = reviews.length ? (total/reviews.length).toFixed(1) : 0;
    document.getElementById("avgRating").innerText = "Average: " + avg + " ⭐";
}

// BACK
function goBack(){
    window.history.back();
}

// LOAD ON START
loadReviews();

</script>

</body>
</html>
