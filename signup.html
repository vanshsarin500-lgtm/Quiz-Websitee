<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - DreamFinder</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">
    <div class="login-box">

        <h2>Create Account</h2>
        <p>Start your journey with DreamFinder</p>

        <form id="signupForm">

    <div class="input-box">
        <input type="text" id="name" required>
        <label>Full Name</label>
    </div>

    <div class="input-box">
        <input type="email" id="email" required>
        <label>Email</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>
    </div>

    <button type="submit" class="btn">Sign Up</button>

    <p style="margin-top:15px;">
        Already have an account? <a href="login.html">Login</a>
    </p>

</form>

    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
    getAuth, 
    createUserWithEmailAndPassword, 
    sendEmailVerification,
    updateProfile 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "AIzaSyCHgbiqtDlQU1IogjiZueOehovU9x-F8xk",
  authDomain: "quiz-8198a.firebaseapp.com",
  projectId: "quiz-8198a",
  storageBucket: "quiz-8198a.firebasestorage.app",
  messagingSenderId: "495360395071",
  appId: "1:495360395071:web:afc7c2492ddcb5bbd3758a"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("signupForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        // ✅ Create user
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);

        // ✅ Save name
        await updateProfile(userCredential.user, {
            displayName: name
        });

        // 🔥 SEND VERIFICATION EMAIL (MAIN PART)
        await sendEmailVerification(userCredential.user);

        alert("✅ Verification email sent! Check your inbox.");

        // Redirect to login
        window.location.href = "login.html";

    } catch (error) {
        alert(error.message);
    }
});
</script>

</body>
</html>
