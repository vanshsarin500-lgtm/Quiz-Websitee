<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roadmap</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #f5f7fa;
}

/* Hero */
.hero {
    background: linear-gradient(135deg, #2b7bbb, #00c6ff);
    color: white;
    padding: 50px;
    text-align: center;
}

/* Container */
.container {
    max-width: 900px;
    margin: auto;
    padding: 30px;
}

/* Progress */
.progress {
    background: #ddd;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 20px;
}

.progress-bar {
    height: 12px;
    width: 0%;
    background: linear-gradient(90deg, #2b7bbb, #00c6ff);
    transition: 0.5s;
}

/* Section */
.section {
    margin-bottom: 30px;
}

.section h2 {
    color: #2b7bbb;
    margin-bottom: 10px;
}

/* Step */
.step {
    display: flex;
    gap: 10px;
    align-items: center;
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.step a {
    color: #2b7bbb;
    text-decoration: none;
}

/* Back button */
.top-bar {
    padding: 15px;
}

.top-bar button {
    background: #2b7bbb;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<div class="top-bar">
    <button onclick="goBack()">⬅ Back</button>
</div>

</div>

<div class="container">

    </div>

    <div id="content"></div>

</div>

// Render roadmap
const content = document.getElementById("content");

function createSection(title, items){
    let html = `<div class="section"><h2>${title}</h2>`;
    
    items.forEach((step, index) => {
        html += `
        <div class="step">
            <input type="checkbox" class="check" onchange="updateProgress()">
            <div>
                ${step[0]} <br>
                <a href="${step[1]}" target="_blank">Learn →</a>
            </div>
        </div>
        `;
    });

    html += `</div>`;
    return html;
}

if(roadmaps[field]){
    const data = roadmaps[field];

    content.innerHTML =
        createSection("Basics", data.basics) +
        createSection("Intermediate", data.intermediate) +
        createSection("Advanced", data.advanced);
}

// 🔥 UPDATE PROGRESS
function updateProgress(){
    const checks = document.querySelectorAll(".check");
    const checked = document.querySelectorAll(".check:checked");

    let percent = (checked.length / checks.length) * 100;

    document.getElementById("progressBar").style.width = percent + "%";

    // Save progress
    localStorage.setItem("progress-" + field, JSON.stringify([...checks].map(c => c.checked)));
}

// 🔥 LOAD SAVED PROGRESS
function loadProgress(){
    const saved = JSON.parse(localStorage.getItem("progress-" + field));

    if(saved){
        const checks = document.querySelectorAll(".check");
        checks.forEach((c, i) => {
            c.checked = saved[i];
        });
    }

    updateProgress();
}

loadProgress();

// Back
function goBack(){

}
